name: Download Gamification

on:
  schedule:
    - cron: "0 0 * * *"  # daily at midnight
  push:
    branches:
      - main

jobs:
  update_gamification:
    runs-on: ubuntu-latest

    steps:
      # Checkout repository
      - uses: actions/checkout@v3

      # Setup Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      # Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      # Run the download points script
      - name: Run download points script
        run: python scripts/update_download_points.py

      # Commit & Push using GITHUB_TOKEN
      - name: Commit & Push
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add GAMIFICATION.md
          git commit -m "Update download gamification points" || echo "No changes to commit"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/origin-svg/maneki-dev.git HEAD:main
